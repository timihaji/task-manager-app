          fontFamily:"'Geist Mono', monospace",
          fontSize:11,fontWeight:600,color:'#1c1917',letterSpacing:'-0.2px',
        }}>FLOW<span style={{color:'#dc2626'}}>·</span></span>
        <span style={{fontSize:11,color:'#78716c'}}>Apr 27 — May 1</span>
        <div style={{flex:1}}/>
        <div style={{display:'flex',gap:1,background:'#f5f5f4',padding:2,borderRadius:5,fontSize:10}}>
          {['Day','Week','Month'].map(v => (
            <div key={v} style={{
              padding:'3px 9px',borderRadius:3,
              background: v === 'Week' ? '#fff' : 'transparent',
              fontWeight: v === 'Week' ? 600 : 400,
              color: v === 'Week' ? '#1c1917' : '#78716c',
              boxShadow: v === 'Week' ? '0 1px 2px rgba(0,0,0,0.05)' : 'none',
            }}>{v}</div>
          ))}
        </div>
        <span style={{fontSize:9,color:'#a8a29e',padding:'2px 5px',borderRadius:3,background:'#f5f5f4',fontFamily:"'Geist Mono',monospace"}}>⌘ /</span>
      </div>

      {/* day header row */}
      <div style={{display:'flex',borderBottom:'1px solid #e7e5e4',background:'#fff',flexShrink:0}}>
        <div style={{width:42,minWidth:42,borderRight:'1px solid #e7e5e4'}}/>
        {DAYS.map((day,i) => {
          const isToday = i === TODAY_IDX;
          const total = TASKS[i].length;
          const done = TASKS[i].filter(t => t.done).length;
          return (
            <div key={i} style={{
              flex:1,padding:'6px 10px',
              borderRight:'1px solid #e7e5e4',
              background: isToday ? '#fef2f2' : '#fff',
            }}>
              <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                <span style={{
                  fontSize:10,fontWeight:600,letterSpacing:'0.06em',
                  color: isToday ? '#dc2626' : '#a8a29e',
                }}>{day}</span>
                <span style={{
                  fontSize:14,fontWeight:600,
                  color: isToday ? '#dc2626' : '#1c1917',
                }}>{DATES[i]}</span>
                <span style={{
                  marginLeft:'auto',fontSize:9,
                  color:'#a8a29e',
                  fontFamily:"'Geist Mono',monospace",
                }}>{done}/{total}</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* timeline grid */}
      <div style={{flex:1,overflowY:'auto',display:'flex',background:'#fff',position:'relative'}}>
        {/* hours column */}
        <div style={{width:42,minWidth:42,borderRight:'1px solid #e7e5e4',position:'relative'}}>
          {HOURS.map((h,i) => (
            <div key={i} style={{
              height:HOUR_H,
              padding:'2px 6px',
              fontSize:9,color:'#a8a29e',
              fontFamily:"'Geist Mono', monospace",
              borderTop: i === 0 ? 'none' : '1px solid #f5f5f4',
              textAlign:'right',
            }}>{h}</div>
          ))}
        </div>

        {/* day columns with blocks */}
        {DAYS.map((day,di) => {
          const isToday = di === TODAY_IDX;
          return (
            <div key={di} style={{
              flex:1,position:'relative',
              borderRight:'1px solid #e7e5e4',
              background: isToday ? 'rgba(254,242,242,0.3)' : 'transparent',
            }}>
              {/* hour grid lines */}
              {HOURS.map((_,i) => (
                <div key={i} style={{
                  height:HOUR_H,
                  borderTop: i === 0 ? 'none' : '1px solid #f5f5f4',
                }}/>
              ))}
              {/* "now" indicator on today */}
              {isToday && (
                <div style={{
                  position:'absolute',
                  top: HOUR_H * 2.4, left:0, right:0, height:1,
                  background:'#dc2626', zIndex:2,
                }}>
                  <div style={{
                    position:'absolute',left:-3,top:-3,
                    width:7,height:7,borderRadius:'50%',
                    background:'#dc2626',
                  }}/>
                </div>
              )}
              {/* task blocks */}
              {blocks.filter(b => b.day === di).map((b,j) => (
                <div key={j} style={{
                  position:'absolute',
                  top: b.start * HOUR_H + 2,
                  left:3, right:3,
                  height: b.dur * HOUR_H - 3,
                  background: b.done ? '#fff' : `${b.color}15`,
                  border: `1px solid ${b.done ? '#e7e5e4' : b.color}40`,
                  borderLeft: `3px solid ${b.color}`,
                  borderRadius:4,
                  padding:'4px 7px',
                  fontSize:10,lineHeight:1.25,
                  color: b.done ? '#a8a29e' : '#1c1917',
                  textDecoration: b.done ? 'line-through' : 'none',
                  overflow:'hidden',
                }}>
                  <div style={{fontWeight:500,fontSize:10.5,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                  }}>{b.title}</div>
                  {b.dur >= 0.5 && (
                    <div style={{
                      fontSize:8.5,color: b.done ? '#a8a29e' : b.color,
                      fontWeight:500,marginTop:1,
                      fontFamily:"'Geist Mono',monospace",
                    }}>{b.tag}</div>
                  )}
                </div>
              ))}
            </div>
          );
        })}
      </div>

      {/* status bar */}
      <div style={{
        height:22,borderTop:'1px solid #e7e5e4',
        display:'flex',alignItems:'center',gap:12,
        padding:'0 12px',fontSize:10,color:'#a8a29e',
        background:'#fff',flexShrink:0,
        fontFamily:"'Geist Mono',monospace",
      }}>
        <span style={{color:'#dc2626'}}>● 11:24</span>
        <span>scheduled: 9h25m</span>
        <span>free: 7h35m</span>
        <div style={{flex:1}}/>
        <span><kbd>D</kbd> drag</span>
        <span><kbd>R</kbd> resize</span>
        <span><kbd>⌘ ↵</kbd> schedule</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   DIRECTION H — "COMMAND"
   Inline-tag syntax (#work @sarah !p1 ~30m).
   Sharp typography. Mono everywhere.
   Floating command bar bottom. Wireframe-y but precise.
   For people who type their tasks like commit messages.
   ═══════════════════════════════════════════════ */
function DirectionH() {
  return (
    <div style={{
      width:'100%',height:'100%',
      background:'#111',
      fontFamily:"'IBM Plex Mono', monospace",
      color:'#e5e5e5',fontSize:11,
      display:'flex',flexDirection:'column',
      overflow:'hidden',
    }}>
      {/* top bar */}
      <div style={{
        height:36,borderBottom:'1px solid #2a2a2a',
        display:'flex',alignItems:'center',gap:12,
        padding:'0 14px',flexShrink:0,
        fontSize:11,
      }}>
        <span style={{color:'#fafafa',fontWeight:600,letterSpacing:'0.05em'}}>~/tasks</span>
        <span style={{color:'#525252'}}>·</span>
        <span style={{color:'#a3a3a3'}}>week 17</span>
        <span style={{color:'#525252'}}>·</span>
        <span style={{color:'#22c55e'}}>● live</span>
        <div style={{flex:1}}/>
        <span style={{color:'#525252'}}>filter:</span>
        <span style={{color:'#fbbf24'}}>!p1,p2</span>
        <span style={{color:'#525252'}}>· sort:</span>
        <span style={{color:'#a5b4fc'}}>day,priority</span>
      </div>

      {/* columns */}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {DAYS.map((day,i) => {
          const isToday = i === TODAY_IDX;
          return (
            <div key={i} style={{
              flex:1,
              borderRight:'1px solid #1f1f1f',
              display:'flex',flexDirection:'column',
              background: isToday ? '#191919' : 'transparent',
            }}>
              <div style={{
                padding:'10px 12px 8px',
                fontSize:10.5,
                borderBottom:'1px solid #1f1f1f',
                color: isToday ? '#fafafa' : '#525252',
              }}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontWeight:600,letterSpacing:'0.05em'}}>{day}</span>
                  <span style={{color:'#404040'}}>{String(DATES[i]).padStart(2,'0')}</span>
                  {isToday && <span style={{color:'#22c55e',fontSize:9,marginLeft:'auto'}}>← now</span>}
                </div>
              </div>
              <div style={{padding:'6px 0',flex:1,overflowY:'auto'}}>
                {TASKS[i].map((t,j) => {
                  const priColor = t.priority === 'p1' ? '#ef4444' : t.priority === 'p2' ? '#fbbf24' : '#525252';
                  return (
                    <div key={j} style={{
                      padding:'4px 12px',
                      fontSize:10.5,lineHeight:1.5,
                      borderLeft: '2px solid transparent',
                      borderLeftColor: t.done ? 'transparent' : isToday && j === 0 ? '#22c55e' : 'transparent',
                      background: isToday && j === 0 && !t.done ? '#1f1f1f' : 'transparent',
                    }}>
                      <div style={{display:'flex',gap:5,alignItems:'flex-start'}}>
                        <span style={{color: t.done ? '#22c55e' : '#404040',marginTop:1}}>
                          {t.done ? '✓' : '◯'}
                        </span>
                        <div style={{flex:1}}>
                          <div style={{
                            color: t.done ? '#525252' : '#e5e5e5',
                            textDecoration: t.done ? 'line-through' : 'none',
                          }}>{t.title}</div>
                          <div style={{fontSize:9.5,marginTop:1,display:'flex',gap:6,flexWrap:'wrap'}}>
                            <span style={{color:'#a5b4fc'}}>#{t.tag}</span>
                            <span style={{color:priColor}}>!{t.priority}</span>
                            <span style={{color:'#71717a'}}>~{t.time}</span>
                            <span style={{color:'#525252'}}>@{t.project.toLowerCase()}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
                {/* prompt */}
                <div style={{padding:'4px 12px',fontSize:10.5,color:'#404040',marginTop:4}}>
                  <span style={{color:'#22c55e'}}>{'›'}</span>
                  <span style={{marginLeft:6,color:'#525252',borderLeft:'1px solid #525252',paddingLeft:0}}> </span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* command bar */}
      <div style={{
        margin:'10px 14px 12px',
        background:'#1a1a1a',
        border:'1px solid #2a2a2a',
        borderRadius:6,
        padding:'8px 12px',
        display:'flex',alignItems:'center',gap:8,
        fontSize:11,flexShrink:0,
      }}>
        <span style={{color:'#22c55e',fontWeight:600}}>›</span>
        <span style={{color:'#a3a3a3'}}>add</span>
        <span style={{color:'#fafafa'}}>"Refactor scheduler"</span>
        <span style={{color:'#a5b4fc'}}>#focus</span>
        <span style={{color:'#ef4444'}}>!p1</span>
        <span style={{color:'#71717a'}}>~2h</span>
        <span style={{color:'#525252'}}>@plat</span>
        <span style={{color:'#fbbf24'}}>thu</span>
        <span style={{
          width:7,height:13,background:'#fafafa',
          marginLeft:2,
          animation:'blink 1s steps(2) infinite',
        }}/>
        <div style={{flex:1}}/>
        <span style={{fontSize:9,color:'#525252'}}>
          <kbd>↹</kbd> autocomplete · <kbd>⏎</kbd> commit · <kbd>esc</kbd> close
        </span>
      </div>
      <style>{`@keyframes blink { 50% { opacity: 0; } }`}</style>
    </div>
  );
}

/* ── App ── */
function App() {
  return (
    <DesignCanvas title="Power-user directions">
      <DCSection id="power" title="Built for keyboard-first humans">
        <DCArtboard id="e" label="E — Terminal  ·  Vim-like, file-tree, hotkeys" width={760} height={460}>
          <DirectionE />
        </DCArtboard>
        <DCArtboard id="f" label="F — Linear  ·  Sleek dark, command palette" width={760} height={460}>
          <DirectionF />
        </DCArtboard>
        <DCArtboard id="g" label="G — Timeline  ·  Hour-grid, time blocking" width={760} height={460}>
          <DirectionG />
        </DCArtboard>
        <DCArtboard id="h" label="H — Command  ·  Inline syntax, mono" width={760} height={460}>
          <DirectionH />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root" style="width:100vw;height:100vh;"></div>
</body>
</html>
